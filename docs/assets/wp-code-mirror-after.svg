  <text class="small" x="1042" y="148">plugin-b</text>
  <rect class="pill-good" x="1081" y="131" width="41" height="20" rx="999"/>
  <text class="pill-text-good" x="1090" y="145">synced</text>

  <rect class="panel-soft" x="760" y="207" width="400" height="116" rx="18"/>
  <text class="section" x="786" y="238">Target Site B</text>
  <text class="small" x="1023" y="238">Aligned code state</text>
  <rect class="module-good" x="786" y="257" width="106" height="42" rx="12"/>
  <text class="small" x="800" y="283">theme</text>
  <rect class="pill-good" x="839" y="266" width="41" height="20" rx="999"/>
  <text class="pill-text-good" x="848" y="280">synced</text>
  <rect class="module-good" x="907" y="257" width="106" height="42" rx="12"/>
  <text class="small" x="921" y="283">plugin-a</text>
  <rect class="pill-good" x="960" y="266" width="41" height="20" rx="999"/>
  <text class="pill-text-good" x="969" y="280">synced</text>
  <rect class="module-good" x="1028" y="257" width="106" height="42" rx="12"/>
  <text class="small" x="1042" y="283">plugin-b</text>
  <rect class="pill-good" x="1081" y="266" width="41" height="20" rx="999"/>
  <text class="pill-text-good" x="1090" y="280">synced</text>

  <rect class="panel-soft" x="760" y="342" width="400" height="116" rx="18"/>
  <text class="section" x="786" y="373">Target Site C</text>
  <text class="small" x="1023" y="373">Aligned code state</text>
  <rect class="module-good" x="786" y="392" width="106" height="42" rx="12"/>
  <text class="small" x="800" y="418">theme</text>
  <rect class="pill-good" x="839" y="401" width="41" height="20" rx="999"/>
  <text class="pill-text-good" x="848" y="415">synced</text>
  <rect class="module-good" x="907" y="392" width="106" height="42" rx="12"/>
  <text class="small" x="921" y="418">plugin-a</text>
  <rect class="pill-good" x="960" y="401" width="41" height="20" rx="999"/>
  <text class="pill-text-good" x="969" y="415">synced</text>
  <rect class="module-good" x="1028" y="392" width="106" height="42" rx="12"/>
  <text class="small" x="1042" y="418">plugin-b</text>
  <rect class="pill-good" x="1081" y="401" width="41" height="20" rx="999"/>
  <text class="pill-text-good" x="1090" y="415">synced</text>
</svg>
