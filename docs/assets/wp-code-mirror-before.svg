<svg width="1200" height="540" viewBox="0 0 1200 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Without WP Code Mirror</title>
  <desc id="desc">A source codebase on the left sends theme and plugin updates through fragmented manual workflows to three target sites with mixed synced and stale states.</desc>
  <defs>
    <style>
      .bg { fill: #F6F8FA; }
      .panel { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.5; rx: 18; }
      .panel-soft { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1.5; rx: 18; }
      .module { fill: #EFF6FF; stroke: #93C5FD; stroke-width: 1.25; rx: 12; }
      .module-stale { fill: #FFF7ED; stroke: #FDBA74; stroke-width: 1.25; rx: 12; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .section { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0.02em; text-transform: uppercase; }
      .label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .pill-good { fill: #DCFCE7; stroke: #86EFAC; stroke-width: 1; rx: 999; }
      .pill-warn { fill: #FFEDD5; stroke: #FDBA74; stroke-width: 1; rx: 999; }
      .pill-text-good { font: 700 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #166534; letter-spacing: 0.04em; text-transform: uppercase; }
      .pill-text-warn { font: 700 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9A3412; letter-spacing: 0.04em; text-transform: uppercase; }
      .route { fill: none; stroke: #94A3B8; stroke-width: 3; stroke-linecap: round; }
      .route-broken { fill: none; stroke: #F59E0B; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 8 10; }
      .route-label { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; rx: 999; }
      .route-text { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #92400E; letter-spacing: 0.04em; text-transform: uppercase; }
      .node-dot { fill: #2563EB; }
      .node-dot-warn { fill: #F59E0B; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="540" rx="28"/>
  <text class="title" x="40" y="52">Without WP Code Mirror</text>

  <rect class="panel" x="40" y="96" width="250" height="390" rx="18"/>
  <text class="section" x="64" y="130">Source Codebase</text>
  <text class="small" x="64" y="152">Single place where the latest code lives</text>

  <rect class="module" x="64" y="182" width="202" height="76" rx="12"/>
  <circle class="node-dot" cx="88" cy="220" r="7"/>
  <text class="label" x="104" y="214">theme</text>
  <text class="small" x="104" y="235">Latest in-development code</text>

  <rect class="module" x="64" y="276" width="202" height="76" rx="12"/>
  <circle class="node-dot" cx="88" cy="314" r="7"/>
  <text class="label" x="104" y="308">plugin-a</text>
  <text class="small" x="104" y="329">Latest in-development code</text>

  <rect class="module" x="64" y="370" width="202" height="76" rx="12"/>
  <circle class="node-dot" cx="88" cy="408" r="7"/>
  <text class="label" x="104" y="402">plugin-b</text>
  <text class="small" x="104" y="423">Latest in-development code</text>

  <path class="route" d="M290 220 C370 220, 390 136, 505 136"/>
  <path class="route-broken" d="M505 136 C610 136, 645 126, 760 126"/>
  <path class="route" d="M290 314 C380 314, 390 270, 505 270"/>
  <path class="route-broken" d="M505 270 C610 270, 645 270, 760 270"/>
  <path class="route" d="M290 408 C370 408, 390 404, 505 404"/>
  <path class="route-broken" d="M505 404 C610 404, 645 414, 760 414"/>

  <rect class="route-label" x="490" y="112" width="124" height="28" rx="999"/>
  <text class="route-text" x="513" y="130">manual copy</text>

  <rect class="route-label" x="482" y="246" width="139" height="28" rx="999"/>
  <text class="route-text" x="505" y="264">zip reinstall</text>

  <rect class="route-label" x="479" y="380" width="145" height="28" rx="999"/>
  <text class="route-text" x="499" y="398">missed update</text>

  <rect class="panel-soft" x="760" y="72" width="400" height="116" rx="18"/>
  <text class="section" x="786" y="103">Target Site A</text>
  <text class="small" x="1004" y="103">Mixed code state</text>
  <rect class="module" x="786" y="122" width="106" height="42" rx="12"/>
  <text class="small" x="800" y="148">theme</text>
  <rect class="pill-good" x="839" y="131" width="41" height="20" rx="999"/>
  <text class="pill-text-good" x="848" y="145">synced</text>
  <rect class="module-stale" x="907" y="122" width="106" height="42" rx="12"/>
  <text class="small" x="921" y="148">plugin-a</text>
  <rect class="pill-warn" x="962" y="131" width="39" height="20" rx="999"/>
  <text class="pill-text-warn" x="971" y="145">stale</text>
  <rect class="module" x="1028" y="122" width="106" height="42" rx="12"/>
  <text class="small" x="1042" y="148">plugin-b</text>
  <rect class="pill-good" x="1081" y="131" width="41" height="20" rx="999"/>
  <text class="pill-text-good" x="1090" y="145">synced</text>

  <rect class="panel-soft" x="760" y="207" width="400" height="116" rx="18"/>
  <text class="section" x="786" y="238">Target Site B</text>
  <text class="small" x="1004" y="238">Mixed code state</text>
  <rect class="module-stale" x="786" y="257" width="106" height="42" rx="12"/>
  <text class="small" x="800" y="283">theme</text>
  <rect class="pill-warn" x="841" y="266" width="39" height="20" rx="999"/>
  <text class="pill-text-warn" x="850" y="280">stale</text>
  <rect class="module" x="907" y="257" width="106" height="42" rx="12"/>
  <text class="small" x="921" y="283">plugin-a</text>
  <rect class="pill-good" x="960" y="266" width="41" height="20" rx="999"/>
  <text class="pill-text-good" x="969" y="280">synced</text>
  <rect class="module-stale" x="1028" y="257" width="106" height="42" rx="12"/>
  <text class="small" x="1042" y="283">plugin-b</text>
  <rect class="pill-warn" x="1083" y="266" width="39" height="20" rx="999"/>
  <text class="pill-text-warn" x="1092" y="280">stale</text>

  <rect class="panel-soft" x="760" y="342" width="400" height="116" rx="18"/>
  <text class="section" x="786" y="373">Target Site C</text>
  <text class="small" x="1016" y="373">Falling behind</text>
  <rect class="module-stale" x="786" y="392" width="106" height="42" rx="12"/>
  <text class="small" x="800" y="418">theme</text>
  <rect class="pill-warn" x="841" y="401" width="39" height="20" rx="999"/>
  <text class="pill-text-warn" x="850" y="415">stale</text>
  <rect class="module-stale" x="907" y="392" width="106" height="42" rx="12"/>
  <text class="small" x="921" y="418">plugin-a</text>
  <rect class="pill-warn" x="962" y="401" width="39" height="20" rx="999"/>
  <text class="pill-text-warn" x="971" y="415">stale</text>
  <rect class="module-stale" x="1028" y="392" width="106" height="42" rx="12"/>
  <text class="small" x="1042" y="418">plugin-b</text>
  <rect class="pill-warn" x="1083" y="401" width="39" height="20" rx="999"/>
  <text class="pill-text-warn" x="1092" y="415">stale</text>
</svg>
